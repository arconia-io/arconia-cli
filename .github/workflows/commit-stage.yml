name: Commit Stage

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.flox/**'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.sdkmanrc'
      - '*.adoc'
      - '*.png'
      - '*.md'
      - '*.txt'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/*.md'
      - '.github/*.yml'
      - '.github/*.yaml'
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: commit-stage-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      
      - name: Set VERSION environment variable
        id: set_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q --no-daemon properties | grep '^version:' | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract project version from Gradle"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Compile and test
        run: ./gradlew build
      
      - name: Native compile and test
        run: ./gradlew nativeCompile nativeTest

  assemble:
    name: Assemble
    needs: [build]
    uses: ./.github/workflows/native-image.yml
    if: ${{ github.ref == 'refs/heads/main' }}
    with:
      version: ${{ needs.build.outputs.version }}

  release:
    name: Release
    needs: [assemble, build]
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      discussions: write
      issues: write
      pull-requests: write
    outputs:
      HASHES: ${{ steps.attestation-data.outputs.HASHES }}
      TAGNAME: ${{ steps.attestation-data.outputs.TAGNAME }}
    steps:
      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: arconia-*
          path: artifacts
          merge-multiple: true

      - name: Inspect artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d artifacts ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "::error::No artifacts found in artifacts/ directory"
            exit 1
          fi
          echo "Artifacts:"
          ls -R artifacts

      - name: Release
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5 # v2.5.0
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.JRELEASER_HOMEBREW_GITHUB_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ needs.build.outputs.version }}
          JRELEASER_SCOOP_GITHUB_TOKEN: ${{ secrets.JRELEASER_SCOOP_GITHUB_TOKEN }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          retention-days: 1
          name: jreleaser-output
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
      
      - name: Identify data for attestation
        shell: bash
        id: attestation-data
        run: |
          set -euo pipefail
          CHECKSUMS_FILE="out/jreleaser/checksums/checksums_sha256.txt"
          OUTPUT_PROPS="out/jreleaser/output.properties"
          if [ ! -s "$CHECKSUMS_FILE" ]; then
            echo "::error::$CHECKSUMS_FILE is missing or empty"
            exit 1
          fi
          if [ ! -s "$OUTPUT_PROPS" ]; then
            echo "::error::$OUTPUT_PROPS is missing or empty"
            exit 1
          fi
          TAGNAME=$(grep '^tagName=' "$OUTPUT_PROPS" | head -n1 | cut -d'=' -f2-)
          if [ -z "$TAGNAME" ]; then
            echo "::error::tagName not found in $OUTPUT_PROPS"
            exit 1
          fi
          HASHES=$(base64 -w0 < "$CHECKSUMS_FILE")
          echo "HASHES=$HASHES" >> "$GITHUB_OUTPUT"
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_OUTPUT"

      - name: Trigger documentation update
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/arconia-io/arconia-docs/dispatches \
            -f event_type='docs-update'

  provenance:
    needs: [ build, release ]
    name: Generate SLSA Provenance Attestation
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      base64-subjects: ${{ needs.release.outputs.HASHES }}
      upload-assets: true
      upload-tag-name: ${{ needs.release.outputs.TAGNAME }}
      provenance-name: arconia-cli-${{ needs.build.outputs.version }}.intoto.jsonl
