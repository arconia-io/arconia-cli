name: Native Image

on:
  workflow_call:
    inputs:
      version:
        description: "The project version."
        required: true
        type: string

jobs:
  build-native:
    name: Build Native Image
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, windows-2025]
        include:
          - os: ubuntu-24.04
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: macos-15
            platform: macos-aarch64
          - os: windows-2025
            platform: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@329c42c5f4c343bceb505f0b28cc8499bc2bf174 # v1.5.4
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build with Gradle
        run: ./gradlew nativeCompile
      
      - name: Assemble distribution
        run: ./gradlew distZip -ParchiveName="arconia-cli-${{ inputs.version }}-${{ matrix.platform }}.zip"
      
      - name: Verify artifact (Unix)
        if: ${{ matrix.platform != 'windows-amd64' }}
        run: build/native/nativeCompile/arconia help
      
      - name: Verify artifact (Windows)
        if: ${{ matrix.platform == 'windows-amd64' }}
        run: build/native/nativeCompile/arconia.exe help

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          retention-days: 1
          name: arconia-cli-${{ inputs.version }}-${{ matrix.platform }}
          path: build/distributions/arconia-cli-${{ inputs.version }}-${{ matrix.platform }}.zip
